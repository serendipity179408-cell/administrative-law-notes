<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行政法課程筆記｜徐偉超</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --ink: #1a1a1a;
    --ink-soft: #555555;
    --line: #e5e5e5;
    --tag-bg: #eef0ec;
    --tag-ink: #4a5a45;
    --max-width: 760px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.7;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 48px 24px 100px;
  }

  header.page-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--line);
  }
  header.page-header .eyebrow {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  header.page-header h1 {
    font-size: 26px;
    margin: 0;
    line-height: 1.4;
  }

  .unit-group {
    margin-bottom: 36px;
  }
  .unit-group-title {
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 700;
    margin-bottom: 12px;
  }

  .note-card {
    display: block;
    text-decoration: none;
    color: inherit;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
    background: var(--bg);
    transition: border-color 0.15s, background 0.15s;
  }
  .note-card:hover {
    border-color: #c9c9c9;
    background: var(--bg-soft);
  }
  .note-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .note-card-title {
    font-size: 16.5px;
    font-weight: 700;
    color: var(--ink);
  }
  .note-card-arrow {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    color: var(--ink-soft);
    transition: transform 0.15s;
  }
  .note-card:hover .note-card-arrow {
    transform: translateX(3px);
  }
  .note-card-desc {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
  }
  .note-card-meta {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-ink);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  .empty-slot {
    border: 1px dashed var(--line);
    border-radius: 10px;
    padding: 18px 20px;
    color: var(--ink-soft);
    font-size: 14.5px;
    text-align: center;
  }

  footer.page-footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-soft);
  }

  @media (max-width: 600px) {
    .wrap { padding: 32px 18px 80px; }
    header.page-header h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="page-header">
    <div class="eyebrow">課程筆記主頁</div>
    <h1>行政法｜徐偉超</h1>
  </header>

  <div class="unit-group">
    <div class="unit-group-title">基礎理論</div>

    <a class="note-card" href="01_基礎理論與行政定義.html">
      <div class="note-card-top">
        <span class="note-card-title">第一堂課：基礎理論與行政定義（上／中／下）</span>
        <svg class="note-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="note-card-desc">行政的定義（組織／形式／實質三分）、實質意義行政界定標準、行政類型與分類、私經濟行政與公私法區別</div>
      <div class="note-card-meta">
        <span class="tag">釋字457/540/448/553</span>
        <span class="tag">名詞解釋表</span>
      </div>
    </a>

    <div class="empty-slot">後續課堂筆記會依序加在這裡</div>
  </div>

  <footer class="page-footer">
    <p>此頁面為筆記索引，每份筆記檔案需與本頁放在同一資料夾內，連結才能正常開啟。</p>
  </footer>

</div>

</body>
</html>
